name: Bug report
description: Report a defect in Spellguard
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      multiple: true
      options:
        - "@spellguard/client"
        - "@spellguard/verifier"
        - "@spellguard/ctls"
        - "@spellguard/amp"
        - "@spellguard/langchain"
        - "@spellguard/openai"
        - "@openclaw/spellguard"
        - "@spellguard/policy-sdk"
        - "@spellguard/policy-catalog"
        - "@spellguard/mcp-guard"
        - spellguard-client (Python)
        - spellguard-langchain (Python)
        - spellguard-crewai (Python)
        - spellguard-ctls (Python)
        - spellguard-amp (Python)
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, branch, or commit SHA.
      placeholder: v0.1.0
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to trigger the bug. Include code snippets or a link to a repro repo if possible.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or logs.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Python version, pnpm version — whatever's relevant.
      placeholder: |
        - OS: macOS 14.5
        - Node: 24.1.0
        - pnpm: 9.15.0
        - Python: 3.13.1

  - type: textarea
    id: extra
    attributes:
      label: Additional context
