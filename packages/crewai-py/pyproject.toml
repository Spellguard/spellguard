[project]
name = "spellguard-crewai"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "spellguard-client>=0.1.0",
    "crewai>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
spellguard-client = { path = "../client/py", editable = true }
spellguard-ctls = { path = "../ctls/py", editable = true }
spellguard-amp = { path = "../amp/py", editable = true }
