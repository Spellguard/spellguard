[project]
name = "agent-pd"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "spellguard-langchain>=0.1.0",
    "spellguard-client>=0.1.0",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
agent-pd = "agent_pd.main:main"

[tool.uv.sources]
spellguard-client = { path = "../../client/py", editable = true }
spellguard-ctls = { path = "../../ctls/py", editable = true }
spellguard-amp = { path = "../../amp/py", editable = true }
spellguard-langchain = { path = "../../langchain/py", editable = true }
