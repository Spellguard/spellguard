#
# Minimal SLIM data plane config for the slim-profile docker-compose stack.
# Mirrors the upstream `config/base/server-config.yaml` from agntcy/slim.
# Insecure-TLS, no authentication — fine for local dev / demos; not for prod.

tracing:
  log_level: info
  display_thread_names: true
  display_thread_ids: true

runtime:
  n_cores: 0
  thread_name: "slim-data-plane"
  drain_timeout: 10s

services:
  slim/0:
    node_id: slim-server
    dataplane:
      servers:
        - endpoint: "0.0.0.0:46357"
          tls:
            insecure: true
      clients: []
